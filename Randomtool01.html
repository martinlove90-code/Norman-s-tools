<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>好運抽獎轉盤 - 記憶版</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 40px 20px;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 30px;
            text-align: center;
        }
        .main-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 40px;
            max-width: 900px;
        }
        /* 轉盤區塊 */
        .wheel-section {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .wheel-container {
            position: relative;
            width: 320px;
            height: 320px;
            margin-bottom: 30px;
        }
        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 8px 15px rgba(0,0,0,0.15);
            border: 4px solid #fff; 
            box-sizing: border-box;
        }
        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 35px solid #e74c3c;
            z-index: 10;
            filter: drop-shadow(0 4px 2px rgba(0,0,0,0.2));
        }
        /* 控制面板區塊 */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 300px;
            background: #fff;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .controls h3 {
            margin: 0;
            color: #34495e;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .controls p {
            font-size: 14px;
            color: #7f8c8d;
            margin: 0;
        }
        /* 標題輸入框 */
        .title-input {
            width: 100%;
            padding: 10px 12px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid #bdc3c7;
            box-sizing: border-box;
            font-family: inherit;
            margin-bottom: 5px;
            transition: border-color 0.2s;
        }
        .title-input:focus {
            outline: none;
            border-color: #3498db;
        }
        textarea {
            width: 100%;
            height: 140px;
            padding: 12px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid #bdc3c7;
            resize: none;
            box-sizing: border-box;
            font-family: inherit;
        }
        textarea:focus {
            outline: none;
            border-color: #3498db;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background-color: #3498db;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            width: 100%;
        }
        button:hover {
            background-color: #2980b9;
            transform: translateY(-2px);
        }
        button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        .btn-update {
            background-color: #2ecc71;
        }
        .btn-update:hover {
            background-color: #27ae60;
        }
        /* 返回控制台連結樣式 */
        .back-link {
            display: block;
            margin-top: 10px;
            color: #3498db;
            text-decoration: none;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            transition: color 0.2s;
        }
        .back-link:hover {
            color: #2980b9;
            text-decoration: underline;
        }
        #result {
            margin-top: 25px;
            font-size: 26px;
            font-weight: bold;
            color: #e67e22;
            min-height: 40px;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1 id="mainTitle">✨ 載入中... ✨</h1>

    <div class="main-container">
        <div class="wheel-section">
            <div class="wheel-container">
                <div class="pointer"></div>
                <canvas id="wheel" width="400" height="400"></canvas>
            </div>
            <button id="spinBtn">開始轉動！</button>
            <div id="result"></div>
        </div>

        <div class="controls">
            <h3>📝 轉盤標題設定</h3>
            <input type="text" id="titleInput" class="title-input" placeholder="請輸入轉盤名稱...">

            <h3>✏️ 自訂轉盤選項</h3>
            <p>請輸入選項，每一行代表一個區塊：</p>
            <textarea id="optionsInput"></textarea>
            <button id="updateBtn" class="btn-update">更新選項</button>
            
            <a href="index.html" class="back-link">← 返回控制台</a>
        </div>
    </div>

    <script>
        const mainTitle = document.getElementById('mainTitle');
        const titleInput = document.getElementById('titleInput');
        const optionsInput = document.getElementById('optionsInput');
        
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const spinBtn = document.getElementById('spinBtn');
        const updateBtn = document.getElementById('updateBtn');
        const resultDiv = document.getElementById('result');

        let segments = [];
        const colors = ['#f1c40f', '#e67e22', '#e74c3c', '#9b59b6', '#3498db', '#1abc9c', '#f39c12', '#d35400', '#c0392b', '#8e44ad', '#2980b9', '#27ae60'];
        
        let currentAngle = 0;
        let isSpinning = false;

        // 預設的選項文字（如果第一次進來沒紀錄，就用這個）
        const defaultOptions = `高雄半日遊\n研究投資理財\n籌備露營Vlog\n玩 PoE 刷寶\n學 Python 與影片剪輯\n買三隻主子的罐頭`;
        const defaultTitle = "好運專屬轉盤";

        // 讀取本地記憶
        function loadSavedData() {
            const savedTitle = localStorage.getItem('wheel_title');
            const savedOptions = localStorage.getItem('wheel_options');

            if (savedTitle !== null) {
                titleInput.value = savedTitle;
            } else {
                titleInput.value = defaultTitle;
            }

            if (savedOptions !== null) {
                optionsInput.value = savedOptions;
            } else {
                optionsInput.value = defaultOptions;
            }
        }

        // --- 標題與日期處理邏輯 ---
        function updateTitle() {
            const d = new Date();
            const dateString = `${d.getFullYear()}/${(d.getMonth() + 1).toString().padStart(2, '0')}/${d.getDate().toString().padStart(2, '0')}`;
            const customName = titleInput.value.trim() || "好運抽獎";
            mainTitle.innerText = `✨ ${dateString} ${customName} ✨`;

            // 即時存檔標題
            localStorage.setItem('wheel_title', titleInput.value);
        }

        // --- 轉盤更新與存檔邏輯 ---
        function updateSegments() {
            const rawText = optionsInput.value;
            segments = rawText.split('\n').map(item => item.trim()).filter(item => item !== '');
            
            if (segments.length === 0) {
                segments = ["請輸入選項"];
            }
            
            currentAngle = 0; 
            resultDiv.innerText = "";
            drawWheel();

            // 即時存檔選項內容
            localStorage.setItem('wheel_options', rawText);
        }

        function drawWheel() {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = centerX;
            const arcSize = (2 * Math.PI) / segments.length;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < segments.length; i++) {
                const angle = currentAngle + i * arcSize;
                
                ctx.beginPath();
                ctx.fillStyle = colors[i % colors.length];
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, angle, angle + arcSize);
                ctx.fill();
                ctx.lineWidth = 2;
                ctx.strokeStyle = "#ffffff";
                ctx.stroke();

                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(angle + arcSize / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "#fff";
                
                let fontSize = segments.length > 10 ? 16 : 20;
                ctx.font = `bold ${fontSize}px 'Segoe UI', sans-serif`;
                
                let text = segments[i];
                if (text.length > 12) text = text.substring(0, 11) + "...";
                
                ctx.fillText(text, radius - 30, fontSize/3);
                ctx.restore();
            }
        }

        function easeOut(t) {
            return 1 - Math.pow(1 - t, 3); 
        }

        function spin() {
            if (isSpinning) return;
            isSpinning = true;
            resultDiv.innerText = "轉動中...";
            spinBtn.style.opacity = "0.5";
            spinBtn.style.cursor = "not-allowed";
            updateBtn.disabled = true;

            const spinTimeTotal = Math.random() * 3000 + 7000; 
            let spinTime = 0;
            const spinAngleStart = Math.random() * 8 + 8; 
            
            function rotateWheel() {
                spinTime += 20;
                if (spinTime >= spinTimeTotal) {
                    stopRotateWheel();
                    return;
                }
                const progress = spinTime / spinTimeTotal;
                const angleStep = spinAngleStart * (1 - easeOut(progress));
                
                currentAngle += (angleStep * Math.PI / 180);
                drawWheel();
                requestAnimationFrame(rotateWheel);
            }

            rotateWheel();
        }

        function stopRotateWheel() {
            isSpinning = false;
            spinBtn.style.opacity = "1";
            spinBtn.style.cursor = "pointer";
            updateBtn.disabled = false;

            const degrees = (currentAngle * 180 / Math.PI) % 360;
            const arcSize = 360 / segments.length;
            const pointAngle = (360 - degrees + 270) % 360;
            const index = Math.floor(pointAngle / arcSize);
            
            const resultText = segments[index];
            resultDiv.innerText = `🎉 恭喜抽中：${resultText}！ 🎉`;
        }

        // 綁定事件
        titleInput.addEventListener('input', updateTitle);
        updateBtn.addEventListener('click', updateSegments);
        spinBtn.addEventListener('click', spin);
        
        // 系統啟動順序
        loadSavedData();  // 第一步：先去記憶體找找看有沒有存檔
        updateTitle();    // 第二步：把標題畫出來
        updateSegments(); // 第三步：把轉盤畫出來
    </script>
</body>
</html>
