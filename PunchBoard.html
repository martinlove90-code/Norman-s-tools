<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>驚喜洞洞樂</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.8);
            --text-main: #f8fafc;
            --accent: #10b981; 
            --accent-hover: #059669;
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: var(--card-bg);
            padding: 30px 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            text-align: center;
            backdrop-filter: blur(10px);
            max-width: 600px; /* 稍微加寬以容納更多卡牌 */
            width: 100%;
        }

        h1 {
            margin-top: 0;
            color: var(--accent);
            letter-spacing: 2px;
            font-size: 2rem;
            text-shadow: 0 2px 10px rgba(16, 185, 129, 0.3);
        }

        /* 數量設定區塊 */
        .config-panel {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            background: rgba(0, 0, 0, 0.2);
            padding: 12px 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .config-panel label {
            font-size: 1rem;
            color: #cbd5e1;
            font-weight: bold;
        }

        .config-panel input {
            width: 70px;
            padding: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            text-align: center;
            border-radius: 8px;
            border: 1px solid #475569;
            background: #1e293b;
            color: #fff;
            outline: none;
            transition: border-color 0.2s;
        }

        .config-panel input:focus {
            border-color: var(--accent);
        }

        .btn-update {
            padding: 8px 16px;
            font-size: 0.95rem;
            font-weight: bold;
            color: #fff;
            background: #3b82f6;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-update:hover { background: #2563eb; transform: translateY(-1px); }

        /* 狀態標籤 */
        .status-label {
            display: inline-block;
            background: rgba(16, 185, 129, 0.2);
            color: #34d399;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 25px;
            border: 1px solid rgba(16, 185, 129, 0.4);
        }

        /* 卡牌網格佈局 (用 JS 動態改變行數) */
        .board {
            display: grid;
            gap: 10px;
            margin-bottom: 30px;
        }

        .card-container {
            width: 100%;
            aspect-ratio: 1 / 1;
            perspective: 1000px;
        }

        .card-inner {
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
            position: relative;
        }

        .card-container.flipped .card-inner {
            transform: rotateY(180deg) scale(0.95);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .card-front {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            border: 2px dashed #60a5fa;
            color: rgba(255, 255, 255, 0.8);
        }

        .card-back {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            border: 2px solid #fbbf24;
            color: #fff;
            transform: rotateY(180deg);
        }

        /* 操作按鈕區塊 */
        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        button {
            flex: 1;
            padding: 15px 20px;
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .btn-draw { background: linear-gradient(to right, #10b981, #059669); }
        .btn-draw:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4); }
        .btn-draw:active { transform: translateY(1px); }
        .btn-draw:disabled { background: #64748b; cursor: not-allowed; transform: none; box-shadow: none; }

        .btn-reset { background: linear-gradient(to right, #64748b, #475569); }
        .btn-reset:hover { background: #475569; transform: translateY(-2px); }
        .btn-reset:active { transform: translateY(1px); }

        .back-link {
            display: inline-block;
            margin-top: 25px;
            color: #38bdf8;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }
        .back-link:hover { color: #7dd3fc; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎁 驚喜洞洞樂</h1>
        
        <div class="config-panel">
            <label for="cardCountInput">洞洞數量：</label>
            <input type="number" id="cardCountInput" value="25" min="2" max="100">
            <button id="applyCountBtn" class="btn-update">套用並重置</button>
        </div>

        <div id="statusLabel" class="status-label">剩餘可抽：25 / 25</div>

        <div class="board" id="board">
            </div>

        <div class="controls">
            <button id="drawBtn" class="btn-draw">🎯 隨機抽取</button>
            <button id="resetBtn" class="btn-reset">🔄 進入下一輪</button>
        </div>
        
        <a href="index.html" class="back-link">← 返回控制台</a>
    </div>

    <script>
        const board = document.getElementById('board');
        const drawBtn = document.getElementById('drawBtn');
        const resetBtn = document.getElementById('resetBtn');
        const statusLabel = document.getElementById('statusLabel');
        const cardCountInput = document.getElementById('cardCountInput');
        const applyCountBtn = document.getElementById('applyCountBtn');

        let TOTAL_CARDS = 25; // 預設數量
        let cardsData = []; 

        // 根據總數量，自動計算最佳的排版欄數 (趨近於正方形)
        function calculateGridColumns(total) {
            let cols = Math.ceil(Math.sqrt(total));
            // 限制最多 10 欄，避免卡片在手機上縮得太小
            if (cols > 10) cols = 10;
            return cols;
        }

        // 根據卡片總數，動態調整字體大小，避免數量太多時文字擠出框外
        function getDynamicFontSize(total) {
            if (total <= 25) return { front: '24px', back: '16px' };
            if (total <= 49) return { front: '18px', back: '12px' };
            return { front: '14px', back: '10px' };
        }

        // 初始化/重置遊戲
        function initGame() {
            board.innerHTML = '';
            cardsData = [];

            // 設定 CSS Grid 欄數
            const cols = calculateGridColumns(TOTAL_CARDS);
            board.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

            const fontSizes = getDynamicFontSize(TOTAL_CARDS);

            for (let i = 0; i < TOTAL_CARDS; i++) {
                const cardEl = document.createElement('div');
                cardEl.className = 'card-container';
                
                cardEl.innerHTML = `
                    <div class="card-inner">
                        <div class="card-front" style="font-size: ${fontSizes.front}">?</div>
                        <div class="card-back" style="font-size: ${fontSizes.back}">中!</div>
                    </div>
                `;
                
                board.appendChild(cardEl);

                cardsData.push({
                    index: i,
                    isDrawn: false,
                    element: cardEl
                });
            }

            updateStatus();
            drawBtn.disabled = false;
        }

        // 應用新的卡牌數量設定
        function applyNewCount() {
            let newCount = parseInt(cardCountInput.value);
            
            // 防呆處理
            if (isNaN(newCount) || newCount < 2) {
                alert("數量至少要 2 張喔！");
                newCount = 2;
                cardCountInput.value = 2;
            } else if (newCount > 100) {
                alert("洞洞數量太多了！為了確保網頁順暢與排版美觀，已為您限制為最大值 100 張。");
                newCount = 100;
                cardCountInput.value = 100;
            }

            TOTAL_CARDS = newCount;
            initGame();
        }

        // 抽牌邏輯
        function drawCard() {
            const availableCards = cardsData.filter(card => !card.isDrawn);
            if (availableCards.length === 0) {
                drawBtn.disabled = true;
                return;
            }

            const randomIndex = Math.floor(Math.random() * availableCards.length);
            const targetCard = availableCards[randomIndex];

            targetCard.isDrawn = true;
            targetCard.element.classList.add('flipped');

            updateStatus();
        }

        // 更新狀態標籤
        function updateStatus() {
            const remaining = cardsData.filter(card => !card.isDrawn).length;
            statusLabel.innerText = `剩餘可抽：${remaining} / ${TOTAL_CARDS}`;

            if (remaining === 0) {
                statusLabel.innerText = "🎉 本輪已全部抽完！";
                statusLabel.style.color = "#fcd34d";
                statusLabel.style.borderColor = "#fcd34d";
                drawBtn.disabled = true;
            } else {
                statusLabel.style.color = "#34d399";
                statusLabel.style.borderColor = "rgba(16, 185, 129, 0.4)";
            }
        }

        // 綁定事件
        drawBtn.addEventListener('click', drawCard);
        resetBtn.addEventListener('click', initGame);
        applyCountBtn.addEventListener('click', applyNewCount);
        
        // 讓輸入框按下 Enter 鍵也能觸發套用
        cardCountInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') applyNewCount();
        });

        // 初始載入
        initGame();
    </script>

</body>
</html>
